# Copy this file to .github/workflows/sql-review.yml in your repo.

# Required secret: ANTHROPIC_API_KEY
#   Add it at: Settings → Secrets and variables → Actions → New repository secret
#   GITHUB_TOKEN is provided automatically by GitHub Actions.

name: SQL Review

on:
  pull_request:
    types: [opened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

jobs:
  sql-review:
    permissions:
      pull-requests: write
      contents: read
    uses: felixglush/explain-analyze-agent/.github/workflows/sql-review.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number || inputs.pr_number }}
      repo: ${{ github.repository }}
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
